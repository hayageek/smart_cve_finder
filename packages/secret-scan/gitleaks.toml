title = "SecScan secret detection"

# Custom rules extend gitleaks' built-in rule set (~170+ rules for AWS keys,
# GitHub PATs, private keys, JWTs, etc.). Patterns below are deduplicated from:
# - Latest AI provider keys (Anthropic, OpenAI, xAI, Groq, OpenRouter, etc.)
# - mazen160/secrets-patterns-db (high-confidence, git-leaks, nuclei, generic, leakin)
#
# Overlapping regexes already covered by gitleaks defaults are omitted.

[extend]
useDefault = true

[allowlist]
description = "Placeholder and example secret patterns"
regexes = [
  '''(?i)(?:example|sample|dummy|fake|placeholder|changeme|your[-_]?api[-_]?key|xxx+|000000|12345678|not[-_]?a[-_]?real)''',
  '''(?i)^sk[-_]test[-_]''',
  '''(?i)^AKIA000000000000000''',
  '''(?i)^\$\{?[A-Z_]+\}?$''',
]

# --- Custom rules (200 deduplicated high-value patterns) ---

