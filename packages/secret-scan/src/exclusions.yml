  - "!**/*.pb.h"
  - "!**/*.o"
  - "!**/*.a"
  - "!**/*.so"
  - "!**/*.dylib"
  - "!**/*.dll"
  - "!**/*_test.*"
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/test_*.*"
  - "!**/test.yml"
  - "!**/test.yaml"
  - "!**/*_test.yml"
  - "!**/*_test.yaml"
  - "!**/conftest.py"
