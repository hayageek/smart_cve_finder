# Path and file exclusions for the SECRET scanner.
#
# Unlike the CVE hunter (packages/cve-semgrep/src/exclusions.yml), this list only
# strips dependency, build-output, and generated/binary noise. Tests, examples,
# docs, markdown, and migrations are deliberately KEPT IN SCOPE because leaked
# credentials disproportionately hide in exactly those locations.
#
# Ripgrep -g globs; ! prefix excludes paths from search.

path_globs:
  - "!**/node_modules/**"
  - "!**/vendor/**"
  - "!**/Godeps/**"
  - "!**/third_party/**"
  - "!**/3rdparty/**"
  - "!**/site-packages/**"
  - "!**/dist/**"
  - "!**/build/**"
  - "!**/out/**"
  - "!**/output/**"
  - "!**/target/**"
  - "!**/.gradle/**"
  - "!**/.cargo/registry/**"
  - "!**/.venv/**"
  - "!**/venv/**"
  - "!**/env/**"
  - "!**/.tox/**"
  - "!**/.cache/**"
  - "!**/coverage/**"
  - "!**/__pycache__/**"
  - "!**/.next/**"
  - "!**/.nuxt/**"
  - "!**/.svelte-kit/**"
  - "!**/CMakeFiles/**"
  - "!**/conan-cache/**"
  - "!**/vcpkg_installed/**"
  - "!**/.ccache/**"

file_globs:
  - "!**/*.lock"
  - "!**/*.min.js"
  - "!**/*.min.css"
  - "!**/*.bundle.js"
  - "!**/*.map"
  - "!**/*-lock.*"
  - "!**/package-lock.json"
  - "!**/yarn.lock"
  - "!**/pnpm-lock.yaml"
  - "!**/Pipfile.lock"
  - "!**/poetry.lock"
  - "!**/uv.lock"
  - "!**/Gemfile.lock"
  - "!**/composer.lock"
  - "!**/Cargo.lock"
  - "!**/go.sum"
  - "!**/*.snap"
  - "!**/*.pb.go"
  - "!**/*.pb.cc"
  - "!**/*.pb.h"
  - "!**/*.o"
  - "!**/*.a"
  - "!**/*.so"
  - "!**/*.dylib"
  - "!**/*.dll"
