# Path and file exclusions for the SECRET scanner.
#
# Unlike the CVE hunter (packages/cve-semgrep/src/exclusions.yml), this list
# strips dependency, build-output, generated/binary noise, test/example/demo/docs
# trees, static assets, and documentation markup. Migrations remain in scope.
#
# Ripgrep -g globs; ! prefix excludes paths from search.
#
# Additionally, exclusions.ts excludes any path whose segment contains "test"
# (case-insensitive): fstest/, testserver/, FooTest.java, etc.

path_globs:
  - "!**/node_modules/**"
  - "!**/.yarn/releases/**"
  - "!**/vendor/**"
  - "!**/Godeps/**"
  - "!**/third_party/**"
  - "!**/3rdparty/**"
  - "!**/site-packages/**"
  - "!**/dist/**"
  - "!**/build/**"
  - "!**/out/**"
  - "!**/output/**"
  - "!**/target/**"
  - "!**/.gradle/**"
  - "!**/.cargo/registry/**"
  - "!**/.venv/**"
  - "!**/venv/**"
  - "!**/env/**"
  - "!**/.tox/**"
  - "!**/.cache/**"
  - "!**/coverage/**"
  - "!**/__pycache__/**"
  - "!**/.next/**"
  - "!**/.nuxt/**"
  - "!**/.svelte-kit/**"
  - "!**/CMakeFiles/**"
  - "!**/conan-cache/**"
  - "!**/vcpkg_installed/**"
  - "!**/.ccache/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/spec/**"
  - "!**/specs/**"
  - "!**/__tests__/**"
  - "!**/__mocks__/**"
  - "!**/__fixtures__/**"
  - "!**/test_data/**"
  - "!**/testdata/**"
  - "!**/fixtures/**"
  - "!**/*Tests_*/**"
  - "!**/*Test_*/**"
  - "!**/example/**"
  - "!**/examples/**"
  - "!**/sample/**"
  - "!**/samples/**"
  - "!**/demo/**"
  - "!**/demos/**"
  - "!**/doc/**"
  - "!**/docs/**"
  - "!**/documentation/**"
  - "!**/benchmark/**"
  - "!**/benchmarks/**"
  - "!**/storybook/**"
  - "!**/.storybook/**"
  - "!**/mock/**"
  - "!**/mocks/**"
  - "!**/e2e/**"
  - "!**/integration/**"
  - "!**/seed/**"
  - "!**/seeds/**"
  - "!**/generated/**"
  - "!**/gen/**"
  - "!**/autogen/**"
  - "!**/public/**"
  - "!**/static/**"
  - "!**/assets/**"
  - "!**/openapi/**"
  - "!**/swagger/**"
  - "!**/i18n/**"
  - "!**/i18/**"
  - "!**/l10n/**"
  - "!**/locale/**"
  - "!**/locales/**"
  - "!**/translations/**"

file_globs:
  - "!**/*.md"
  - "!**/*.markdown"
  - "!**/*.html"
  - "!**/*.rst"
  - "!**/*.txt"
  - "!**/*.adoc"
  - "!**/*.asciidoc"
  - "!**/*.http"
  - "!**/*.rest"
  - "!**/*.postman_collection.json"
  - "!**/*.insomnia.json"
  - "!**/*.oas.json"
  - "!**/*.openapi.json"
  - "!**/*-openapi.json"
  - "!**/*.wsdl"
  # Public X.509 certificates (not private keys — those usually live in .pem/.key)
  - "!**/*.crt"
  - "!**/*.cer"
  - "!**/.env.example"
  - "!**/.env.sample"
  - "!**/.env.template"
  - "!**/*.mock.*"
  - "!**/*.stub.*"
  - "!**/*.sln"
  - "!**/*.vcxproj"
  - "!**/*.vcxproj.filters"
  - "!**/*Tests.*"
  - "!**/*.vbproj"
  - "!**/*.fsproj"
  - "!**/*.msbuild"
  - "!**/*.msbuildproj"
  - "!**/*.msbuildproj.user"
  - "!**/*.msbuildproj.user.props"
  - "!**/*.msbuildproj.user.targets"
  - "!**/*.msbuildproj.user.props"
  - "!**/*.msbuildproj.user.targets"
  - "!**/*.msbuildproj.user.props"
  - "!**/*.msbuildproj.user.targets"
  - "!**/*.lock"
  - "!**/*.min.js"
